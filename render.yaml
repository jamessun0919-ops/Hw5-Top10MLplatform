{
  "name": "top10ml-backend",
  "env": {
    "PYTHON_VERSION": "3.11.0"
  },
  "services": [
    {
      "type": "web",
      "name": "api",
      "env": "python",
      "buildCommand": "pip install -r requirements.txt",
      "startCommand": "uvicorn backend.main:app --host 0.0.0.0 --port $PORT",
      "healthCheckPath": "/api/algorithms",
      "numInstances": 1
    }
  ]
}
