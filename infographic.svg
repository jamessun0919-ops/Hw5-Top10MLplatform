  <text x="478" y="268" text-anchor="middle" fill="#00f0ff" font-size="11" font-weight="bold">Port 3000</text>
  <text x="478" y="285" text-anchor="middle" fill="#64748b" font-size="10">localhost:3000</text>

  <!-- Arrow -->
  <line x1="560" y1="270" x2="610" y2="270" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="610,265 620,270 610,275" fill="#7c3aed"/>

  <!-- Backend box -->
  <rect x="630" y="220" width="490" height="100" rx="12" fill="url(#cardGrad)" stroke="rgba(124,58,237,0.2)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="630" y="220" width="490" height="4" rx="2" fill="#7c3aed"/>
  <text x="660" y="255" fill="#7c3aed" font-size="16" font-weight="bold">後端 — FastAPI</text>
  <text x="660" y="278" fill="#94a3b8" font-size="12">• Python · scikit-learn · NumPy</text>
  <text x="660" y="296" fill="#94a3b8" font-size="12">• 10 個演算法 API · Pydantic 驗證</text>
  <rect x="980" y="240" width="120" height="60" rx="8" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <text x="1040" y="268" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="bold">Port 8000</text>
  <text x="1040" y="285" text-anchor="middle" fill="#64748b" font-size="10">localhost:8000</text>

