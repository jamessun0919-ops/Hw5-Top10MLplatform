  <text x="70" y="375" fill="#00f0ff" font-size="20" font-weight="bold">十大演算法</text>
  <line x1="70" y1="385" x2="170" y2="385" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>

  <!-- Algorithm cards grid -->
  <!-- Row 1 -->
  <g transform="translate(80, 400)">
    <rect width="240" height="90" rx="10" fill="url(#cardGrad)" stroke="rgba(0,240,255,0.12)" stroke-width="1" filter="url(#shadow)"/>
    <rect x="10" y="10" width="32" height="32" rx="8" fill="url(#headerGrad)"/>
    <text x="26" y="31" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
    <text x="52" y="28" fill="#e2e8f0" font-size="14" font-weight="bold">線性回歸</text>
    <text x="52" y="46" fill="#64748b" font-size="10">監督式學習 · 回歸</text>
    <text x="12" y="70" fill="#00f0ff" font-size="10">y = wx + b · 最小化 MSE</text>
  </g>
  <g transform="translate(340, 400)">
