<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" font-family="'Segoe UI', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#111638"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(17,22,56,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(10,14,39,0.9)"/>
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="1600" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="200" r="150" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1100" cy="200" r="100" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <circle cx="100" cy="1400" r="120" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>
  <circle cx="100" cy="1400" r="80" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.12"/>

  <!-- Header -->
  <rect x="50" y="30" width="1100" height="120" rx="16" fill="url(#cyberGrad)" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>
  <rect x="70" y="55" width="60" height="60" rx="12" fill="url(#headerGrad)"/>
  <text x="100" y="92" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">ML</text>
  <text x="150" y="80" fill="#00f0ff" font-size="36" font-weight="bold" filter="url(#glow)">TOP10ML</text>
  <text x="152" y="105" fill="#94a3b8" font-size="16">機器學習十大演算法互動學習平台</text>

  <!-- Status badge -->
  <rect x="920" y="55" width="200" height="36" rx="18" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <circle cx="940" cy="73" r="5" fill="#10b981"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" xlink:href="#dot"/>
  <circle id="dot" cx="940" cy="73" r="5" fill="#10b981"/>
  <text x="960" y="78" fill="#10b981" font-size="14" font-weight="600">已部署 · 線上</text>
  <text x="938" y="108" fill="#64748b" font-size="11">Two-server architecture</text>

