  <rect x="80" y="220" width="480" height="4" rx="2" fill="url(#headerGrad)"/>
  <text x="110" y="255" fill="#00f0ff" font-size="16" font-weight="bold">前端 — Next.js 16</text>
  <text x="110" y="278" fill="#94a3b8" font-size="12">• React + TypeScript + Tailwind CSS</text>
  <text x="110" y="296" fill="#94a3b8" font-size="12">• Recharts 互動圖表 · 科技風格 UI</text>
